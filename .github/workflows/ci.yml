name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  frontend:
    name: Frontend build (Vite + React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-iq-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ai-iq-frontend/package-lock.json
      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi
      - name: Build
        run: npm run build
      - name: Lint (optional)
        run: npm run lint --if-present
      - name: Analyze (optional)
        run: npm run analyze --if-present

  backend:
    name: Backend lint (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-iq-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
