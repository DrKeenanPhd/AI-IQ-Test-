services:
  - type: web
    name: ai-iq-backend
    env: python
    region: oregon
    plan: free
    autoDeploy: true
    rootDir: ai-iq-backend
    buildCommand: |
      pip install --upgrade pip
      pip install poetry
      poetry install --no-interaction --no-ansi
    startCommand: |
      poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set these in Render dashboard or here (recommended: dashboard)
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_BASE_URL
        value: https://services.leadconnectorhq.com
      - key: GHL_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
